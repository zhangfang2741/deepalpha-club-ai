name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync --all-extras --all-groups
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright
